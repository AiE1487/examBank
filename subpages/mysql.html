<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySQL数据库题库 - 中等职业教育自测题库</title>
<script>(function(){if(localStorage.getItem('crtFlickerEnabled')==='false')document.documentElement.classList.add('crt-flicker-disabled');})();</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--y:#FFEE00;--yb:#FFF200;--bk:#0A0A0A;--dk:#1A1A1A;--gd:#2A2A2A;--g:#808080;--gl:#E5E5E5;--w:#FFFFFF;--r:#CC0000;--rd:#8B0000;--gn:#00AA66;--ac:#4A90D9}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bk);color:var(--w);overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dk)}
::-webkit-scrollbar-thumb{background:var(--y);border-radius:3px}

/* CRT Flicker */
@keyframes scanFlicker{0%{opacity:0;transform:translateY(30px)}20%{opacity:1;transform:translateY(0)}25%{opacity:0;transform:translateY(0)}45%{opacity:1;transform:translateY(0)}50%{opacity:0;transform:translateY(0)}70%{opacity:1;transform:translateY(0)}100%{opacity:1;transform:translateY(0)}}
.anim-flicker{opacity:0}
.anim-flicker.visible{animation:scanFlicker .6s steps(1) forwards}
.crt-flicker-disabled .anim-flicker,
.crt-flicker-disabled .anim-flicker.visible{
  opacity:1 !important;
  animation:none !important;
}
.crt-toggle{
  padding:4px 10px;
  background:transparent;
  border:1px solid rgba(255,238,0,.4);
  color:var(--y);
  font-size:10px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:all .3s;
  font-family:"Courier New",monospace;
}
.crt-toggle:hover{
  background:var(--y);
  color:var(--dk);
}
.crt-toggle.off{
  border-color:rgba(128,128,128,.4);
  color:var(--g);
}

/* Top bar */
.topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 30px;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar-back{font-size:13px;color:var(--g);cursor:pointer;transition:color .3s}
.topbar-back:hover{color:var(--y)}
.topbar-right{display:flex;align-items:center;gap:15px}
.topbar-title{font-size:14px;font-weight:700;letter-spacing:2px}
.topbar-tag{font-family:"Courier New",monospace;font-size:10px;color:var(--g);letter-spacing:2px}

/* Timer */
.timer-bar{position:fixed;top:50px;left:0;right:0;height:36px;background:rgba(26,26,26,.95);z-index:999;display:none;align-items:center;justify-content:center;border-bottom:1px solid rgba(255,255,255,.06);gap:15px}
.timer-bar.show{display:flex}
.timer-label{font-size:10px;color:var(--g);letter-spacing:2px;font-family:"Courier New",monospace}
.timer-value{font-size:18px;font-weight:900;color:var(--y);font-family:"Courier New",monospace}

/* Progress */
.progress-bar{position:fixed;top:50px;left:0;right:0;height:2px;background:rgba(255,255,255,.06);z-index:998;transition:top .3s}
.progress-fill{height:100%;background:var(--y);width:0%;transition:width .3s;box-shadow:0 0 8px var(--y)}

/* Page header */
.page-header{padding:90px 30px 40px;background:linear-gradient(180deg,#111,#0a0a0a);border-bottom:1px solid rgba(255,255,255,.06)}
.page-header-inner{max-width:1200px;margin:0 auto}
.page-tag{color:var(--y);font-size:10px;letter-spacing:4px;font-family:"Courier New",monospace;margin-bottom:10px}
.page-title{font-size:36px;font-weight:900;letter-spacing:6px}
.page-sub{font-size:12px;color:var(--g);letter-spacing:2px;margin-top:8px;font-family:"Courier New",monospace}
.page-stats{display:flex;gap:20px;margin-top:25px;flex-wrap:wrap}
.page-stat{background:rgba(255,255,255,.04);border-left:3px solid var(--y);padding:10px 20px}
.page-stat-num{font-size:20px;font-weight:900;color:var(--y);font-family:"Courier New",monospace}
.page-stat-label{font-size:10px;color:var(--g);letter-spacing:1px;margin-top:2px;text-transform:uppercase}

/* Controls */
.controls-section{padding:20px 30px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06)}
.controls-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:15px}
.filter-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-label{font-size:10px;color:var(--g);letter-spacing:2px;font-family:"Courier New",monospace}
.filter-btn{padding:6px 16px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--g);font-size:12px;cursor:pointer;transition:all .3s;font-family:inherit}
.filter-btn:hover{border-color:var(--y);color:var(--y)}
.filter-btn.active{background:var(--y);border-color:var(--y);color:var(--dk);font-weight:700}
.action-group{display:flex;gap:10px}
.reveal-btn{padding:8px 20px;background:var(--y);border:none;color:var(--dk);font-size:12px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
.reveal-btn:hover{background:var(--yb);box-shadow:0 0 20px rgba(255,238,0,.3)}
.reveal-btn.revealed{background:var(--r);color:var(--w)}
.exam-btn{padding:8px 20px;background:transparent;border:1px solid var(--y);color:var(--y);font-size:12px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
.exam-btn:hover{background:var(--y);color:var(--dk)}
.exam-btn.active{background:var(--y);color:var(--dk)}

/* Questions */
.questions-section{padding:30px;max-width:1200px;margin:0 auto;min-height:50vh}
.question-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);margin-bottom:15px;padding:25px 30px;transition:all .3s}
.question-item:hover{border-color:rgba(255,255,255,.15)}
.question-item.hidden{display:none}
.question-header{display:flex;align-items:flex-start;gap:15px;margin-bottom:15px}
.question-num{font-size:11px;font-weight:700;font-family:"Courier New",monospace;min-width:40px;padding-top:2px}
.question-type-badge{font-size:9px;padding:2px 8px;border:1px solid rgba(255,255,255,.2);margin-left:auto;white-space:nowrap;letter-spacing:1px}
.question-text{font-size:15px;font-weight:500;line-height:1.7;flex:1}

/* Choice */
.question-options{margin:15px 0 15px 55px}
.question-option{padding:10px 15px;background:rgba(255,255,255,.04);margin-bottom:6px;border-left:3px solid transparent;cursor:pointer;transition:all .2s;font-size:14px}
.question-option:hover{background:rgba(255,255,255,.08);border-left-color:var(--y)}
.question-option.selected{background:rgba(255,238,0,.1);border-left-color:var(--y);color:var(--y)}
.question-option .opt-label{font-weight:700;margin-right:10px;font-family:"Courier New",monospace}

/* Judge */
.judge-options{display:flex;gap:15px;margin:15px 0 15px 55px}
.judge-btn{padding:8px 24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:var(--w);font-size:14px;cursor:pointer;transition:all .3s;font-family:inherit}
.judge-btn:hover{border-color:var(--y);color:var(--y)}
.judge-btn.selected{background:rgba(255,238,0,.15);border-color:var(--y);color:var(--y);font-weight:700}

/* Fill */
.fill-input-area{margin:15px 0 15px 55px}
.fill-input{width:100%;max-width:400px;padding:10px 15px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:var(--w);font-size:14px;font-family:inherit}
.fill-input:focus{outline:none;border-color:var(--y)}

/* Answer */
.answer-area{margin:15px 0 15px 55px;padding:15px 20px;background:rgba(255,238,0,.06);border-left:3px solid var(--y);display:none}
.answer-area.show{display:block}
.answer-label{font-size:10px;color:var(--y);letter-spacing:2px;font-family:"Courier New",monospace;margin-bottom:6px}
.answer-text{font-size:14px;font-weight:700;color:var(--w)}
.explanation-text{font-size:13px;color:rgba(255,255,255,.55);margin-top:8px;line-height:1.7}

/* Single reveal */
.single-reveal-btn{margin:10px 0 0 55px;padding:6px 16px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--g);font-size:11px;cursor:pointer;transition:all .3s;font-family:inherit;letter-spacing:1px}
.single-reveal-btn:hover{border-color:var(--y);color:var(--y)}

/* Result */
.result-area{margin:10px 0 0 55px;padding:10px 15px;display:none;font-size:13px}
.result-correct{background:rgba(0,170,102,.1);border-left:3px solid var(--gn)}
.result-wrong{background:rgba(204,0,0,.1);border-left:3px solid var(--r)}

/* Submit area */
.submit-area{display:none;padding:40px 30px;text-align:center;border-top:1px solid rgba(255,255,255,.08);margin-top:20px}
.submit-btn{padding:14px 50px;background:var(--y);border:none;color:var(--dk);font-size:16px;font-weight:900;cursor:pointer;transition:all .3s;letter-spacing:2px}
.submit-btn:hover{background:var(--yb);box-shadow:0 0 30px rgba(255,238,0,.4)}
.submit-hint{font-size:11px;color:var(--g);margin-top:12px;font-family:"Courier New",monospace}

/* Stats area */
.stats-area{display:none;padding:40px 30px;background:linear-gradient(180deg,rgba(255,238,0,.05),transparent);border-top:3px solid var(--y);margin-top:20px}
.stats-inner{max-width:800px;margin:0 auto}
.stats-title{font-size:24px;font-weight:900;letter-spacing:4px;margin-bottom:30px;text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);padding:20px;text-align:center}
.stat-card-label{font-size:10px;color:var(--g);letter-spacing:2px;font-family:"Courier New",monospace;margin-bottom:8px;text-transform:uppercase}
.stat-card-value{font-size:32px;font-weight:900;font-family:"Courier New",monospace}
.stat-card-value.yellow{color:var(--y)}
.stat-card-value.green{color:var(--gn)}
.stat-card-value.red{color:var(--r)}
.stat-detail{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:20px;line-height:2}
.stat-types{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.stat-type-tag{font-size:11px;padding:4px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:"Courier New",monospace}
.stat-actions{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.stat-btn{padding:10px 24px;background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--w);font-size:12px;cursor:pointer;transition:all .3s;font-family:inherit}
.stat-btn:hover{border-color:var(--y);color:var(--y)}
.stat-btn.primary{background:var(--y);border-color:var(--y);color:var(--dk);font-weight:700}
.stat-btn.primary:hover{background:var(--yb)}
.stat-user{cursor:pointer;color:var(--y);border-bottom:1px dashed var(--y);padding-bottom:2px}
.stat-user:hover{opacity:.8}

/* Floating nav */
.nav-float{position:fixed;right:20px;bottom:30px;display:flex;flex-direction:column;gap:8px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.nav-float.visible{opacity:1;pointer-events:auto}
.nav-float-btn{width:44px;height:44px;background:var(--dk);border:1px solid rgba(255,255,255,.15);color:var(--w);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;font-size:16px}
.nav-float-btn:hover{background:var(--y);border-color:var(--y);color:var(--dk)}

/* Footer */
.footer{background:var(--gd);padding:25px 30px;text-align:center;font-size:11px;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.06)}

/* Responsive */
@media(max-width:768px){
  .page-title{font-size:24px;letter-spacing:3px}
  .page-stats{gap:10px}
  .page-stat{padding:8px 14px}
  .controls-inner{flex-direction:column;align-items:flex-start}
  .question-options,.judge-options,.fill-input-area,.answer-area,.result-area,.single-reveal-btn{margin-left:0}
  .stats-grid{grid-template-columns:1fr}
  .question-header{flex-direction:column;gap:8px}
}
@media(max-width:480px){
  .topbar{padding:0 15px}
  .page-header{padding:80px 15px 30px}
  .questions-section,.controls-section{padding:15px}
  .submit-area{padding:30px 15px}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-back" onclick="location.href='../index.html'"><span>◀</span> 返回</div>
  <div class="topbar-right">
    <button class="crt-toggle" id="crtToggle" title="开关CRT闪烁效果">CRT</button>
    <div class="topbar-title">MySQL数据库题库</div>
    <div class="topbar-tag">// MYSQL.EXAM</div>
  </div>
</div>

<!-- Timer -->
<div class="timer-bar" id="timerBar">
  <span class="timer-label">EXAM TIMER //</span>
  <span class="timer-value" id="timerDisplay">00:00</span>
</div>

<!-- Progress -->
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<!-- Header -->
<section class="page-header">
  <div class="page-header-inner">
    <div class="page-tag anim-flicker">// SUBJECT.MYSQL</div>
    <div class="page-title anim-flicker">MySQL数据库题库</div>
    <div class="page-sub anim-flicker">SQL QUERIES // DATABASE DESIGN // DATA MANAGEMENT</div>
    <div class="page-stats anim-flicker">
      <div class="page-stat"><div class="page-stat-num" id="totalCount">--</div><div class="page-stat-label">TOTAL</div></div>
      <div class="page-stat"><div class="page-stat-num" id="choiceCount">--</div><div class="page-stat-label">CHOICE</div></div>
      <div class="page-stat"><div class="page-stat-num" id="fillCount">--</div><div class="page-stat-label">FILL</div></div>
      <div class="page-stat"><div class="page-stat-num" id="judgeCount">--</div><div class="page-stat-label">JUDGE</div></div>
    </div>
  </div>
</section>

<!-- Controls -->
<section class="controls-section">
  <div class="controls-inner">
    <div class="filter-group">
      <span class="filter-label">FILTER //</span>
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="choice">选择</button>
      <button class="filter-btn" data-filter="fill">填空</button>
      <button class="filter-btn" data-filter="judge">判断</button>
    </div>
    <div class="action-group">
      <button class="reveal-btn" id="revealBtn" onclick="Exam.toggleAllAnswers()">一键展示答案</button>
      <button class="exam-btn" id="examBtn" onclick="Exam.toggleExamMode()">考试模式</button>
    </div>
  </div>
</section>

<!-- Questions -->
<section class="questions-section" id="questionsContainer"></section>

<!-- Submit Area -->
<div class="submit-area" id="submitArea">
  <button class="submit-btn" id="submitBtn" onclick="Exam.submitExam()">提交试卷</button>
  <div class="submit-hint">提交后将自动判卷并显示统计信息 // 未作答题目将被忽略</div>
</div>

<!-- Stats Area -->
<div class="stats-area" id="statsArea">
  <div class="stats-inner">
    <div class="stats-title">考试结果统计</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-label">作答总数</div>
        <div class="stat-card-value yellow" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">正确 / 错误</div>
        <div class="stat-card-value green" id="statCorrect" style="font-size:22px">0 / 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">正确率</div>
        <div class="stat-card-value yellow" id="statRate">0%</div>
      </div>
    </div>
    <div class="stat-detail">
      答题人：<span class="stat-user" id="statUser" onclick="Exam.editUserName()">访客</span> |
      用时：<span id="statTime">00:00</span> |
      日期：<span id="statDate">--</span>
    </div>
    <div class="stat-types" id="statTypes"></div>
    <div class="stat-actions">
      <button class="stat-btn" id="showWrongBtn" onclick="Exam.toggleShowWrong()">仅查看错误</button>
      <button class="stat-btn primary" onclick="Exam.continueExam()">继续作答</button>
    </div>
  </div>
</div>

<!-- Floating Nav -->
<div class="nav-float" id="navFloat">
  <button class="nav-float-btn" onclick="Exam.goTop()" title="回到顶部">▲</button>
  <button class="nav-float-btn" onclick="Exam.goBottom()" title="回到底部">▼</button>
</div>

<!-- Footer -->
<footer class="footer anim-flicker">
  <div>中等职业教育自测题库 | 本题库为非商业使用，内容由社区贡献</div>
</footer>

<script src="../src/mysql-data.js"></script>
<script src="../src/exam.js"></script>
<script>
Exam.init('mysql', 'MySQL数据库');
</script>
</body>
</html>
